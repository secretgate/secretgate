    - MySQL Connection String: "mysql://[^\\s'\"/:]+:[^\\s'\"@]+@[^\\s'\"]{5,}"
    - Redis Connection String: "rediss?://[^\\s'\"/:]+:[^\\s'\"@]+@[^\\s'\"]{5,}"
    - JDBC Connection String: "jdbc:[a-z:]+://[A-Za-z0-9.\\-_:;=/@?,&]+"

# --- Generic Patterns ---

- Generic:
    - Private Key: "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
    - JWT Token: "eyJ[A-Za-z0-9-_]+\\.eyJ[A-Za-z0-9-_]+\\.[A-Za-z0-9-_.+/=]+"
    - Basic Auth: "(?i)basic\\s+[A-Za-z0-9+/=]{20,}"
    - Password in URL: "(?i)(?:https?|ftp|amqp)://[^\\s'\"/:]+:[^\\s'\"@]{8,}@[^\\s'\"/@]+"
